openapi: 3.0.0
info:
  title: SpeakUp API Documentation
  description: RESTful API for SpeakUp App (Effortless English Platform)
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Local Development Server

paths:
  /auth/login:
    post:
      summary: Đăng nhập
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Đăng nhập thành công, trả về JWT.

  /courses:
    get:
      summary: Lấy danh sách khóa học
      tags:
        - Courses
      responses:
        '200':
          description: Danh sách khóa học.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

  /lessons/{id}:
    get:
      summary: Lấy chi tiết một bài học (gồm Audio URL và Transcript)
      tags:
        - Lessons
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Chi tiết bài học.

  /progress/sync:
    post:
      summary: Đồng bộ tiến độ nghe (số giây đang nghe dở)
      tags:
        - Progress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lessonId:
                  type: string
                lastPosition:
                  type: integer
      responses:
        '200':
          description: Đồng bộ thành công.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Course:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        level:
          type: string
        cover_image_url:
          type: string
