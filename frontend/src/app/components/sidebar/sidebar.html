<!-- Mobile Hamburger Button -->
<button class="mobile-toggle" (click)="toggleMobileMenu()" [class.hide-toggle]="isMobileMenuOpen">
  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 12h18M3 6h18M3 18h18" />
  </svg>
</button>

<aside class="sidebar" [class.open]="isMobileMenuOpen">
  <div class="sidebar-header">
    <div class="logo">Speak<span>Up</span></div>
    
    <!-- Nút X (Close) chỉ hiện trên mobile khi mở sidebar -->
    <button class="mobile-close-btn" (click)="toggleMobileMenu()">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <span class="section-title">Menu</span>
      <a routerLink="/app/dashboard" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </span>
        <span>Dashboard</span>
      </a>
      <a routerLink="/app/explore" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        </span>
        <span>Explore Courses</span>
      </a>
      <a routerLink="/app/progress" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
        </span>
        <span>My Progress</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="section-title">Settings</span>
      <a routerLink="/app/profile" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </span>
        <span>Profile</span>
      </a>
      <a (click)="authService.signOut()" class="nav-item logout">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </span>
        <span>Log Out</span>
      </a>
    </div>
  </nav>

</aside>

<!-- Đóng menu trên mobile khi click ra ngoài -->
@if (isMobileMenuOpen) {
  <div class="mobile-overlay" (click)="toggleMobileMenu()"></div>
}
