<!-- Mobile Hamburger Button -->
<button class="mobile-toggle" (click)="toggleMobileMenu()" [class.hide-toggle]="isMobileMenuOpen">
  <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M3 12h18M3 6h18M3 18h18" />
  </svg>
</button>

<aside class="sidebar admin-sidebar" [class.open]="isMobileMenuOpen">
  <div class="sidebar-header">
    <div class="logo">Speak<span>Up</span> <span class="admin-badge">Admin</span></div>
    
    <!-- Nút X (Close) chỉ hiện trên mobile khi mở sidebar -->
    <button class="mobile-close-btn" (click)="toggleMobileMenu()">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12" />
      </svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <span class="section-title">Admin Controls</span>
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </span>
        <span>Dashboard</span>
      </a>

      <a routerLink="/admin/courses" routerLinkActive="active" class="nav-item" [routerLinkActiveOptions]="{exact: true}">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
          </svg>
        </span>
        <span>Courses</span>
      </a>
    </div>

    <div class="nav-section">
      <span class="section-title">Settings</span>
      <a routerLink="/admin/profile" routerLinkActive="active" class="nav-item">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </span>
        <span>Profile</span>
      </a>
      <a (click)="authService.signOut()" class="nav-item logout">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </span>
        <span>Log Out</span>
      </a>
    </div>
  </nav>

</aside>

<!-- Đóng menu trên mobile khi click ra ngoài -->
@if (isMobileMenuOpen) {
  <div class="mobile-overlay" (click)="toggleMobileMenu()"></div>
}
