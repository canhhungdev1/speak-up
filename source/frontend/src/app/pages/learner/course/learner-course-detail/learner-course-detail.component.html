<div class="page-header">
  <div class="header-left">
    <a routerLink="/dashboard/courses" class="btn-back">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      {{ 'COURSE_DETAIL.BACK_TO_EXPLORE' | translate }}
    </a>
  </div>
</div>

<div class="course-hero" *ngIf="course">
  <img [src]="course.coverImageUrl || 'assets/images/default-course.jpg'" alt="Course Cover" class="cover-image">
  <div class="hero-content">
    <h1>{{ course.title }}</h1>
    <p class="desc">{{ course.description }}</p>
    <div class="stats">
      <span>{{ 'COURSE_DETAIL.LESSON_SETS' | translate }}: <strong>{{ lessonSets.length }}</strong></span>
    </div>
  </div>
</div>

<div class="content-section" *ngIf="course">
  <h2>{{ 'COURSE_DETAIL.COURSE_CONTENT' | translate }}</h2>
  
  <div class="lesson-set-list">
    <div class="lesson-set-card" *ngFor="let set of lessonSets; let i = index">
      <div class="set-info">
        <h3>{{ i + 1 }}. {{ set.title }}</h3>
      </div>
      <div class="set-action">
        <button class="btn-primary" (click)="goToSet(set.id)">
          {{ 'COURSE_DETAIL.START_LEARNING' | translate }}
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>
