<div class="page-header">
  <h1>{{ 'EXPLORE.TITLE' | translate }}</h1>
  <p>{{ 'EXPLORE.SUBTITLE' | translate }}</p>
</div>

<div class="course-grid">
  <div *ngIf="isLoading" class="loading-state">
    <div class="spinner"></div>
    <p>Loading courses...</p>
  </div>

  <div class="empty-state" *ngIf="!isLoading && courses.length === 0">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
    <h3>{{ 'EXPLORE.NO_COURSES' | translate }}</h3>
  </div>

  <a *ngFor="let course of courses" class="course-card" [routerLink]="['/dashboard/courses', course.id]">
    <div class="cover-image" [style.backgroundImage]="'url(' + (course.coverImageUrl || '/assets/default-cover.png') + ')'"></div>
    <div class="course-info">
      <h3>{{ course.title }}</h3>
      <p>{{ course.description || ('COMMON.NO_DESCRIPTION' | translate) }}</p>
      <div class="progress-bar-container">
        <div class="progress-bar" style="width: 0%"></div>
      </div>
      <div class="course-footer">
        <span>0% {{ 'DASHBOARD.COMPLETED' | translate }}</span>
        <button class="btn-primary-sm">{{ 'DASHBOARD.RESUME_LESSON' | translate }}</button>
      </div>
    </div>
  </a>
</div>
