<div class="admin-page">
  <!-- Header với nút quay lại -->
  <div class="page-header">
    <div class="header-left">
      <a [routerLink]="['/admin/courses', courseId]" class="btn-back">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Trở về Khóa học
      </a>
      <h1 *ngIf="lessonSet">{{ lessonSet.title }}</h1>
      <p *ngIf="lessonSet">{{ lessonSet.description || 'Quản lý các nội dung chi tiết của bộ bài học này' }}</p>
    </div>
  </div>

  <!-- Tabs Điều hướng -->
  <div class="tabs-container">
    <nav class="tabs-nav">
      <a routerLink="main" routerLinkActive="active" class="tab-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"/></svg>
        Main Article
      </a>
      <a routerLink="vocab" routerLinkActive="active" class="tab-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        Vocabulary
      </a>
      <a routerLink="mini-stories" routerLinkActive="active" class="tab-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Mini Stories
      </a>
      <a routerLink="pov" routerLinkActive="active" class="tab-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m10 15 5-3-5-3v6Z"/></svg>
        Point of View (POV)
      </a>
    </nav>
  </div>

  <!-- Router Outlet hiển thị Component con -->
  <div class="manager-content">
    <router-outlet></router-outlet>
  </div>
</div>
