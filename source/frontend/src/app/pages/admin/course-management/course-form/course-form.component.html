<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ course ? 'Sửa Khóa học' : 'Thêm Khóa học mới' }}</h2>
      <button class="btn-close" (click)="close.emit()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label>Tên Khóa học <span class="required">*</span></label>
        <input type="text" [(ngModel)]="formData.title" placeholder="Ví dụ: Original Effortless English" class="form-control">
      </div>

      <div class="form-group">
        <label>Mô tả chi tiết</label>
        <textarea [(ngModel)]="formData.description" placeholder="Giới thiệu về khóa học..." class="form-control" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label>Đường dẫn Ảnh bìa (Cover Image URL)</label>
        <input type="text" [(ngModel)]="formData.coverImageUrl" placeholder="https://..." class="form-control">
        <div class="image-preview" *ngIf="formData.coverImageUrl">
          <img [src]="formData.coverImageUrl" alt="Preview" onerror="this.style.display='none'">
        </div>
      </div>

      <div class="form-group checkbox-group">
        <label class="toggle-switch">
          <input type="checkbox" [(ngModel)]="formData.isPublished">
          <span class="slider"></span>
        </label>
        <div class="toggle-label">
          <strong>Xuất bản (Publish)</strong>
          <p>Hiển thị khóa học này cho Học viên</p>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" (click)="close.emit()" [disabled]="isSaving">Hủy</button>
      <button class="btn-primary" (click)="save()" [disabled]="isSaving">
        <span *ngIf="isSaving" class="spinner-small"></span>
        {{ isSaving ? 'Đang lưu...' : 'Lưu Khóa học' }}
      </button>
    </div>
  </div>
</div>
