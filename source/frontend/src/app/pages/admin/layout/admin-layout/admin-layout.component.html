<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="logo" routerLink="/" style="cursor: pointer;">
      <h2>Speak<span>Up</span> <small>Admin</small></h2>
    </div>
    <ul class="menu-list">
      <li class="menu-item" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <a routerLink="/admin">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          <span>Tổng quan</span>
        </a>
      </li>
      <li class="menu-item" routerLinkActive="active">
        <a routerLink="/admin/courses">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          <span>Khóa học</span>
        </a>
      </li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>
</div>
