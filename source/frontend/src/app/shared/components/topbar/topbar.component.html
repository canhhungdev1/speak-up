<header class="topbar">
  <div class="left-section">
    <button class="icon-btn menu-toggle" (click)="toggleSidebar()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
    </button>

    <div class="search-box">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <input type="text" placeholder="Search lessons..." />
    </div>
  </div>

  <div class="actions">
    <div class="streak-badge">
      <span class="fire-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      </span>
      <span class="streak-text">5 Day Streak</span>
    </div>
    
    <button class="icon-btn theme-toggle" (click)="toggleTheme()">
      <svg *ngIf="!isDarkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      <svg *ngIf="isDarkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
    </button>
    <button class="icon-btn notif-toggle">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
    </button>
    
    <!-- Hộp Chọn Ngôn Ngữ (Language Selector) -->
    <div class="lang-selector-container">
      <button class="lang-btn" (click)="toggleLangDropdown()">
        <span class="flag-icon">
          <svg *ngIf="currentLang === 'vi'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2" width="18" height="12"><rect width="3" height="2" fill="#da251d"/><polygon points="1.5,0.4 1.83,1.3 1.0,0.75 2.0,0.75 1.17,1.3" fill="#ffff00"/></svg>
          <svg *ngIf="currentLang === 'en'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 30" width="18" height="12"><clipPath id="s"><path d="M0,0 v30 h50 v-30 z"/></clipPath><clipPath id="t"><path d="M0,0 L50,30 M50,0 L0,30"/></clipPath><g clip-path="url(#s)"><path d="M0,0 L50,30 M50,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L50,30 M50,0 L0,30" stroke="#c8102e" stroke-width="4" clip-path="url(#t)"/><path d="M0,15 H50 M25,0 V30" stroke="#fff" stroke-width="10"/><path d="M0,15 H50 M25,0 V30" stroke="#c8102e" stroke-width="6"/></g></svg>
        </span>
        <span class="lang-text">{{ currentLang === 'vi' ? 'VI' : 'EN' }}</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="chevron-down" [style.transform]="showLangDropdown ? 'rotate(180deg)' : 'none'"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      
      <!-- Dropdown danh sách ngôn ngữ -->
      <div class="lang-dropdown" *ngIf="showLangDropdown">
        <button class="dropdown-item" [class.active]="currentLang === 'vi'" (click)="selectLang('vi')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2" width="18" height="12" class="dropdown-flag"><rect width="3" height="2" fill="#da251d"/><polygon points="1.5,0.4 1.83,1.3 1.0,0.75 2.0,0.75 1.17,1.3" fill="#ffff00"/></svg>
          <span>Tiếng Việt (VI)</span>
          <svg *ngIf="currentLang === 'vi'" class="check-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
        <button class="dropdown-item" [class.active]="currentLang === 'en'" (click)="selectLang('en')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 30" width="18" height="12" class="dropdown-flag"><clipPath id="s2"><path d="M0,0 v30 h50 v-30 z"/></clipPath><clipPath id="t2"><path d="M0,0 L50,30 M50,0 L0,30"/></clipPath><g clip-path="url(#s2)"><path d="M0,0 L50,30 M50,0 L0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 L50,30 M50,0 L0,30" stroke="#c8102e" stroke-width="4" clip-path="url(#t2)"/><path d="M0,15 H50 M25,0 V30" stroke="#fff" stroke-width="10"/><path d="M0,15 H50 M25,0 V30" stroke="#c8102e" stroke-width="6"/></g></svg>
          <span>English (EN)</span>
          <svg *ngIf="currentLang === 'en'" class="check-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </button>
      </div>
    </div>
  </div>
</header>
